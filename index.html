<!doctype html>
<html lang="en">

<head>
  <script>
    // System Guard: Prevent common TMA loading issues without blocking wallet providers
    (function () {
      var handleCrash = function (m, s, l, c, e) {
        var msg = String(m || "").toLowerCase();
        var isCrossOrigin = msg.indexOf("cross-origin") !== -1 || msg.indexOf("blocked a frame") !== -1 || msg.indexOf("permission denied") !== -1;

        if (isCrossOrigin) {
          console.warn("System Shield: Muted cross-origin frame access error for TMA compatibility");
          return true;
        }
        return false;
      };

      window.onerror = function (m, s, l, c, e) {
        if (handleCrash(m, s, l, c, e)) return true;
        return false;
      };

      window.addEventListener('unhandledrejection', function (event) {
        handleCrash(String(event.reason), "", 0);
      });
    })();
  </script>
